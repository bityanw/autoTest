version: '3.8'

services:
  # 应用运行容器（动态创建，这里是模板）
  app-runner:
    image: autotest/app-runner:latest
    build:
      context: ./app-runner
      dockerfile: Dockerfile
    networks:
      - autotest-network
    environment:
      - MAVEN_REPO_URL=${MAVEN_REPO_URL}
      - ARTIFACT_GROUP=${ARTIFACT_GROUP}
      - ARTIFACT_ID=${ARTIFACT_ID}
      - ARTIFACT_VERSION=${ARTIFACT_VERSION}

  # Playwright测试容器
  playwright-runner:
    image: mcr.microsoft.com/playwright:v1.40.0-focal
    container_name: playwright-runner
    networks:
      - autotest-network
    volumes:
      - ../ai-test-generator/generated-tests:/tests
      - ../reports:/reports
    working_dir: /tests
    command: tail -f /dev/null  # 保持容器运行
    environment:
      - BASE_URL=http://app:8080

networks:
  autotest-network:
    driver: bridge
